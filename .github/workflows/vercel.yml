name: Deploy co-web to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      XDG_DATA_HOME: ${{ runner.temp }}/xdg-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check static app
        run: npm run check

      - name: Restore Vercel CLI auth
        run: |
          mkdir -p "$XDG_DATA_HOME/com.vercel.cli"
          printf '%s' '${{ secrets.VERCEL_AUTH_JSON_B64 }}' | base64 -d > "$XDG_DATA_HOME/com.vercel.cli/auth.json"

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production

      - name: Build Vercel output
        run: npx vercel build --prod

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod
