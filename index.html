<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="co-web" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>co-web</title>
    <style>
      html,
      body,
      #app {
        background: #000000;
      }

      video {
        background-color: #000000 !important;
      }

      video::-webkit-media-controls,
      video::-webkit-media-controls-enclosure,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-start-playback-button,
      video::-webkit-media-controls-overlay-play-button {
        display: none !important;
      }
    </style>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192.png" />
    <link rel="stylesheet" href="/src/modules/app/presentation/app.css" />
  </head>
  <body>
    <div id="app" class="co-app" data-camera-state="booting">
      <main class="camera-stage" aria-label="카메라 화면">
        <video id="camera-preview" class="camera-preview" autoplay playsinline muted></video>

        <section id="camera-permission" class="permission-panel" aria-live="polite">
          <strong id="permission-title">카메라 준비 중</strong>
          <span id="permission-message">카메라 권한을 확인하고 있습니다.</span>
          <div class="permission-actions">
            <button id="start-camera-button" type="button">카메라 시작</button>
            <button id="install-app-button" type="button" hidden>홈 화면 설치</button>
          </div>
        </section>

        <section id="toast" class="toast" hidden></section>
        <div class="launch-cover" aria-hidden="true"></div>

        <nav class="bottom-toolbar" aria-label="co-second 하단 툴바">
          <button type="button" class="toolbar-button" data-feature="map" aria-label="지도">
            <span class="toolbar-icon">◎</span>
          </button>
          <button type="button" class="toolbar-button" data-feature="analysis" aria-label="선택 분석">
            <span class="toolbar-icon search-icon"></span>
          </button>
          <button type="button" class="toolbar-button" data-feature="media" aria-label="미디어">
            <span class="toolbar-icon">♪</span>
          </button>
          <button type="button" class="toolbar-button youtube-button" data-feature="youtube" aria-label="YouTube">
            <span class="toolbar-icon youtube-play"></span>
          </button>
          <button type="button" class="toolbar-button" data-feature="mic" aria-label="마이크">
            <span class="toolbar-icon mic-off-icon"></span>
          </button>
          <button type="button" class="toolbar-button" data-feature="drawing" aria-label="드로잉">
            <span class="toolbar-icon brush-icon"></span>
          </button>
          <button type="button" class="toolbar-button" data-feature="columns" aria-label="세로줄">
            <span class="toolbar-icon columns-icon"></span>
          </button>
          <button type="button" class="toolbar-button" data-feature="chat" aria-label="채팅">
            <span class="toolbar-icon chat-icon"></span>
          </button>
        </nav>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
